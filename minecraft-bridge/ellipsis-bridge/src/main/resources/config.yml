# EllipsisBridge private server config
# Never paste the Supabase service role key into the website or public GitHub.

supabase:
  url: "https://jcesknevzbhgrnbuuzre.supabase.co"
  service-role-key: "PASTE_SUPABASE_SERVICE_ROLE_KEY_HERE"
  request-timeout-seconds: 15

bridge:
  enabled: false
  server-key: "ellipsis-main"
  server-name: "Ellipsis SMP"
  heartbeat-enabled: true
  heartbeat-seconds: 30
  poll-actions-seconds: 5
  sync-online-players-seconds: 60
  action-batch-size: 5
  mark-processing-before-execute: true
  log-http-errors: true

commands:
  give-rank: "lp user {player} parent add {rank}"
  give-coins: "cmi money give {player} {amount}"
  give-crate-key: "excellentcrates key give {player} {crate} {amount}"
  give-item: "minecraft:give {player} {item} {amount}"
  give-kit: "cmi kit {kit} {player}"

  jail: "cmi jail {player} jail"
  unjail: "cmi unjail {player}"
  temp-ban: "cmi tempban {player} {duration} {reason}"
  unban: "cmi unban {player}"
  kick: "cmi kick {player} {reason}"
  mute: "cmi mute {player} {duration} {reason}"
  unmute: "cmi unmute {player}"
  warn: "cmi warn {player} {reason}"

  whitelist-add: "minecraft:whitelist add {player}"
  whitelist-remove: "minecraft:whitelist remove {player}"
  maintenance-enable: "cmi maintenance true"
  maintenance-disable: "cmi maintenance false"

  server-broadcast: "cmi broadcast &d&l{title} &8» &f{message}"
  title-broadcast: "cmi titlemsg all &d&l{title} &f{message}"
  actionbar-broadcast: "cmi actionbarmsg all &d{message}"
  sound-broadcast: "minecraft:execute as @a run playsound {sound} master @s ~ ~ ~ {volume} {pitch}"

  manual-delivery-allow-custom-command: false
  manual-delivery-command: "say Manual delivery for {player}: {deliveryType} {productName}"

# approved_command only executes keys listed here.
# Future website buttons can use payload: {"commandKey":"example-broadcast"}
approved-commands:
  example-broadcast: "cmi broadcast &d&lEllipsis SMP &8» &fApproved command test."
  example-reward: "cmi money give {player} {amount}"

profile-sync:
  enabled: true
  sync-on-join: true
  sync-on-quit: true
  sync-online-players: true
  sync-offline-players-from-actions: true

  placeholders:
    current-rank: "%luckperms_primary_group_name%"
    balance: "%vault_eco_balance_fixed%"
    votes: "%votingplugin_total%"
    leaderboard-position: ""
    leaderboard-score: ""
    jobs-level: ""
    auraskills-power: ""

  raw-placeholders:
    luckperms-prefix: "%luckperms_prefix%"
    cmi-playtime: "%cmi_user_playtime%"
    jobs-current: ""
    auraskills-power: ""
    voting-total: "%votingplugin_total%"

messages:
  prefix: "[EllipsisBridge]"